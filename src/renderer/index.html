<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Lock the renderer down: no remote content, no inline-injected book markup runs.
         font-src 'self' lets the bundled local @font-face .woff2 files load; nothing
         is ever fetched from a network/CDN. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; font-src 'self';"
    />
    <title>Reader</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="fonts.css" />
  </head>
  <body data-theme="light" data-view="single" data-screen="library">
    <header id="topbar">
      <div class="brand">Reader</div>
      <nav class="controls">
        <button type="button" id="library-btn" aria-label="Back to library" title="Back to library">← Library</button>
        <button type="button" id="toc-btn" aria-label="Table of contents" title="Chapters (t)">
          ☰ Chapters
        </button>
        <div class="segmented" id="view-toggle" role="group" aria-label="View mode">
          <button type="button" data-view="single" class="active">Single page</button>
          <button type="button" data-view="two">Two-page</button>
          <button type="button" data-view="continuous">Scroll</button>
        </div>
        <button type="button" id="add-btn" class="primary">Add book</button>
        <button type="button" id="settings-btn" aria-label="Comfort settings" title="Comfort settings">
          Aa
        </button>
        <button type="button" id="voice-btn" aria-label="Voice settings" title="Voice settings">Voice</button>
      </nav>
    </header>

    <!-- Comfort popover: how the page LOOKS (font, size, theme, width). -->
    <section id="comfort-panel" class="popover" hidden aria-label="Comfort settings">
      <div class="setting setting-font">
        <span>Font</span>
        <div class="font-list" id="font-list" role="listbox" aria-label="Reading font"></div>
      </div>
      <div class="setting">
        <span>Text size</span>
        <div class="segmented">
          <button type="button" id="font-smaller" aria-label="Smaller text">A−</button>
          <button type="button" id="font-larger" aria-label="Larger text">A+</button>
        </div>
      </div>
      <div class="setting">
        <span>Theme</span>
        <div class="segmented" id="theme-toggle">
          <button type="button" data-theme="light" class="active">Light</button>
          <button type="button" data-theme="dark">Dark</button>
        </div>
      </div>
      <div class="setting">
        <label for="width-range">Page width</label>
        <input id="width-range" type="range" min="34" max="80" step="2" value="46" />
      </div>
    </section>

    <!-- Voice popover: how the page SOUNDS (voice, speed, end-of-chapter pause). -->
    <section id="voice-panel" class="popover" hidden aria-label="Voice settings">
      <div class="setting setting-voice">
        <span>Voice</span>
        <div class="voice-list" id="voice-list" role="listbox" aria-label="Narration voice"></div>
      </div>
      <div class="setting">
        <label for="speed-range">Reading speed</label>
        <input id="speed-range" type="range" min="0.7" max="1.5" step="0.05" value="1" />
        <span id="speed-label" aria-live="polite">1.0×</span>
      </div>
      <div class="setting">
        <span>End-of-chapter pause</span>
        <div class="segmented" id="pause-toggle">
          <button type="button" data-pause="off" class="active">Off</button>
          <button type="button" data-pause="short">Short</button>
          <button type="button" data-pause="longer">Longer</button>
        </div>
      </div>
    </section>

    <main id="stage">
      <section id="library-view">
        <header class="library-head"><h1>Your library</h1></header>
        <div id="library-empty" class="empty-card" hidden>
          <h1>No books yet</h1>
          <p>Drag an EPUB, Markdown, or Word file here, or click <strong>Add book</strong>.</p>
        </div>
        <h2 class="shelf-title" id="active-title" hidden>Reading</h2>
        <div class="shelf" id="shelf-active"></div>
        <h2 class="shelf-title" id="finished-title" hidden>Finished</h2>
        <div class="shelf" id="shelf-finished"></div>
      </section>
      <div id="empty-state">
        <div class="empty-card">
          <h1>Reader</h1>
          <p>Drag an EPUB, Markdown, or Word file here, or click <strong>Add book</strong>.</p>
        </div>
      </div>
      <!-- The clipping window. Page margins live here as padding; the column flow
           inside (#reading) stays padding-free so column math isn't thrown off. -->
      <div id="reading-viewport" hidden>
        <article id="reading"></article>
      </div>
    </main>

    <!-- Chapter table of contents — slides in over the left edge. -->
    <div id="toc-overlay" hidden></div>
    <aside id="toc-panel" hidden aria-label="Table of contents">
      <h2>Chapters</h2>
      <ol id="toc-list"></ol>
    </aside>

    <footer id="bottom-bar" hidden>
      <!-- Transport icons are inline SVG drawn in currentColor so they follow the
           theme and never render as colored OS emoji. They're decorative — the
           accessible name lives on each button's aria-label/title. -->
      <button type="button" id="back-para" aria-label="Back one paragraph" title="Back a paragraph">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 6h2v12H6V6zm12 0v12l-9-6 9-6z"/></svg>
      </button>
      <button type="button" id="back-sent" aria-label="Back one sentence" title="Back a sentence">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 14 4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-1"/></svg>
      </button>
      <button type="button" id="play-pause" class="play" aria-label="Play" title="Play / Pause (Space)">
        <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7L8 5z"/></svg>
        <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 5h3v14H7V5zm7 0h3v14h-3V5z"/></svg>
      </button>
      <button type="button" id="fwd-sent" aria-label="Forward one sentence" title="Forward a sentence">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 14 5-5-5-5"/><path d="M20 9H9a5 5 0 0 0 0 10h1"/></svg>
      </button>
      <button type="button" id="prev-chapter" aria-label="Previous chapter" title="Previous chapter ([)">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M11 6v12l-9-6 9-6zm9 0v12l-9-6 9-6z"/></svg>
      </button>
      <button type="button" id="prev-page" aria-label="Previous page" title="Previous page (←)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 6-6 6 6 6"/></svg>
      </button>
      <div id="orientation" aria-live="polite">&nbsp;</div>
      <button type="button" id="next-page" aria-label="Next page" title="Next page (→)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 6 6 6-6 6"/></svg>
      </button>
      <button type="button" id="next-chapter" aria-label="Next chapter" title="Next chapter (])">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M13 6l9 6-9 6V6zm-9 0l9 6-9 6V6z"/></svg>
      </button>
    </footer>

    <div id="drop-overlay" hidden><span>Drop to open</span></div>

    <!-- render.js + paginate.js define window.ReaderRender / window.ReaderPaginate used by app.js -->
    <script src="render.js"></script>
    <script src="paginate.js"></script>
    <script src="reading-cursor.js"></script>
    <script src="player.js"></script>
    <script src="library-view.js"></script>
    <script src="app.js"></script>
  </body>
</html>
